                        labels: ['긍정', '중립', '부정'],
                        datasets: [{
                            data: [pos, neu, neg],
                            backgroundColor: ['#2563eb', '#16a34a', '#dc2626']
                        }]
                    }
                });

                // 3. 별점 차트 생성 (1점~5점 분리 연산)
                const ratings = [1, 2, 3, 4, 5].map(r => globalDataset.filter(d => parseInt(d.rating) === r).length);
                new Chart(document.getElementById('ratingChart'), {
                    type: 'bar',
                    data: {
                        labels: ['1점', '2점', '3점', '4점', '5점'],
                        datasets: [{
                            label: '리뷰 수',
                            data: ratings,
                            backgroundColor: '#3b82f6'
                        }]
                    },
                    options: { scales: { y: { beginAtZero: true } } }
                });
            }
        } catch (e) {
            console.error("데이터 연산 중 오류 발생:", e);
        }
    </script>
</body>
</html>
